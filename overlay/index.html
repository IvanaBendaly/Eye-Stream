<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watcher Familiar Eye</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="overlay-root" class="overlay" data-mode="overlay">
      <div id="eye-shell" class="eye-shell state-awake" aria-label="Watcher familiar eye">
        <div class="halo"></div>
        <div class="veil"></div>

        <div id="eye" class="eye">
          <div class="upper-lid"></div>
          <div class="lower-lid"></div>

          <div id="iris" class="iris">
            <div class="pupil"></div>
            <span class="iris-glint iris-glint-main"></span>
            <span class="iris-glint iris-glint-small"></span>
          </div>

          <span class="spark spark-a"></span>
          <span class="spark spark-b"></span>
        </div>
      </div>

      <aside id="test-ui" class="test-ui" hidden>
        <div class="test-ui__row">
          <button data-act="state" data-value="dormant">dormant</button>
          <button data-act="state" data-value="awake">awake</button>
          <button data-act="state" data-value="fond">fond</button>
          <button data-act="state" data-value="agitated">agitated</button>
          <button data-act="state" data-value="possessed">possessed</button>
        </div>
        <div class="test-ui__row">
          <button data-act="action" data-value="blink">blink</button>
          <button data-act="action" data-value="glance">glance</button>
          <button data-act="action" data-value="pulse">pulse</button>
          <button data-act="action" data-value="possess">possess burst</button>
          <button data-act="action" data-value="calm">calm reset</button>
        </div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
