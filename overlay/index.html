<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost Dog Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="overlay-root" class="overlay-corner">
      <div class="overlay-hint">Chat to guide the ghost dog!</div>

      <div id="pet-shell" class="pet-shell state-awakened" aria-label="Ghost dog stream pet">
        <div class="aura"></div>

        <div class="state-fx" aria-hidden="true">
          <span class="fx-ring"></span>
          <span class="fx-heart fx-heart-a">❤</span>
          <span class="fx-heart fx-heart-b">❤</span>
          <span class="fx-star fx-star-a">✦</span>
          <span class="fx-star fx-star-b">✦</span>
          <span class="fx-skull">☠</span>
        </div>

        <div class="ivy-cloud" aria-hidden="true">
          <span class="ivy-vine ivy-vine-left"></span>
          <span class="ivy-vine ivy-vine-right"></span>
          <span class="ivy-leaf ivy-leaf-a"></span>
          <span class="ivy-leaf ivy-leaf-b"></span>
        </div>

        <div id="ghost-dog" class="ghost-dog">
          <div id="dog-body" class="dog-body">
            <span class="dog-spots dog-spots-a"></span>
            <span class="dog-spots dog-spots-b"></span>
            <span class="dog-chest"></span>
          </div>

          <div class="dog-leg dog-leg-front-a"></div>
          <div class="dog-leg dog-leg-front-b"></div>
          <div class="dog-leg dog-leg-back-a"></div>
          <div class="dog-leg dog-leg-back-b"></div>

          <div id="dog-face" class="dog-face">
            <div class="dog-brow dog-brow-left"></div>
            <div class="dog-brow dog-brow-right"></div>

            <div id="dog-eye-left" class="dog-eye">
              <span class="dog-eye-sclera"></span>
              <span class="dog-eye-iris"></span>
              <span class="dog-eye-pupil"></span>
              <span class="dog-eye-shine"></span>
            </div>
            <div id="dog-eye-right" class="dog-eye">
              <span class="dog-eye-sclera"></span>
              <span class="dog-eye-iris"></span>
              <span class="dog-eye-pupil"></span>
              <span class="dog-eye-shine"></span>
            </div>

            <div class="dog-blush dog-blush-left"></div>
            <div class="dog-blush dog-blush-right"></div>
            <div class="dog-nose"></div>
            <div class="dog-mouth"></div>
            <div class="dog-tooth dog-tooth-left"></div>
            <div class="dog-tooth dog-tooth-right"></div>
          </div>

          <div class="dog-ear dog-ear-left"></div>
          <div class="dog-ear dog-ear-right"></div>
          <div id="dog-tail" class="dog-tail"></div>
        </div>
      </div>

      <aside id="chat-sim" class="chat-sim" aria-live="polite" hidden>
        <div class="chat-sim__header">
          <span>Chat sim</span>
          <span id="chat-state" class="chat-sim__state">Awakened • 0</span>
        </div>
        <div id="chat-feed" class="chat-sim__feed"></div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
