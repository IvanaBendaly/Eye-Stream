<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivy Corner Companion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="overlay-root" class="overlay-corner">
      <div id="ivy-shell" class="ivy-shell state-sprout" aria-label="Ivy Companion">
        <div class="mist"></div>
        <div class="stem"></div>
        <div class="curl curl-main"></div>
        <div class="curl curl-secondary"></div>

        <div class="leaf leaf-a"></div>
        <div class="leaf leaf-b"></div>
        <div class="leaf leaf-c"></div>
        <div class="leaf leaf-d"></div>

        <div class="thorn thorn-a"></div>
        <div class="thorn thorn-b"></div>

        <div class="bud" id="bud"></div>
        <div class="bloom" id="bloom"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
