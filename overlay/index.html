<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursed Lantern Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="overlay-root" class="overlay-corner" data-mode="live" data-state="awake">
      <section id="lantern" class="lantern state-awake" aria-label="Reactive lantern companion">
        <div class="chain" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="lantern-halo" aria-hidden="true"></div>

        <div class="lantern-shell">
          <span class="frame cap"></span>
          <span class="frame body"></span>
          <span class="frame base"></span>
          <span class="glass"></span>
          <span class="sigil"></span>
          <span class="cracks"></span>
          <span class="thorn-ring"></span>
          <span class="vine-wrap"></span>
          <span class="flame-core"></span>
          <span class="flame-inner"></span>
        </div>

        <div class="particle-layer warm" aria-hidden="true"></div>
        <div class="particle-layer ash" aria-hidden="true"></div>
        <div class="particle-layer smoke" aria-hidden="true"></div>
        <div class="particle-layer leaves" aria-hidden="true"></div>
        <div class="burst-ring" aria-hidden="true"></div>
      </section>

      <section class="interaction-header" aria-label="interaction header">
        <p>Chat to stir the flame</p>
      </section>

      <aside id="chat-panel" class="chat-panel" aria-label="Lantern companion chat panel">
        <ol id="chat-list"></ol>

        <form id="chat-input-form" class="chat-input" hidden>
          <input id="chat-input" type="text" maxlength="140" placeholder="Type to trigger states (love, burn, crack, cursed, dead, vine...)" autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </aside>

      <p id="tiny-status" class="tiny-status" hidden></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
