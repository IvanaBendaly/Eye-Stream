<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ghost Dog Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="overlay-root" class="overlay-corner">
      <div class="overlay-hint">Chat to guide the ghost dog!</div>

      <div id="pet-shell" class="pet-shell state-awakened" aria-label="Ghost dog stream pet">
        <div class="aura"></div>

        <div class="ivy-cloud" aria-hidden="true">
          <span class="ivy-vine ivy-vine-left"></span>
          <span class="ivy-vine ivy-vine-right"></span>
          <span class="ivy-leaf ivy-leaf-a"></span>
          <span class="ivy-leaf ivy-leaf-b"></span>
        </div>

        <div id="ghost-dog" class="ghost-dog">
          <div id="dog-body" class="dog-body"></div>
          <div id="dog-face" class="dog-face">
            <div id="dog-eye-left" class="dog-eye"></div>
            <div id="dog-eye-right" class="dog-eye"></div>
            <div class="dog-nose"></div>
            <div class="dog-mouth"></div>
          </div>
          <div class="dog-ear dog-ear-left"></div>
          <div class="dog-ear dog-ear-right"></div>
          <div id="dog-tail" class="dog-tail"></div>
        </div>
      </div>

      <aside id="chat-sim" class="chat-sim" aria-live="polite" hidden>
        <div class="chat-sim__header">
          <span>Chat sim</span>
          <span id="chat-state" class="chat-sim__state">Awakened • 0</span>
        </div>
        <div id="chat-feed" class="chat-sim__feed"></div>
      </aside>
    </div>

    <script src="app.js"></script>
  </body>
</html>
