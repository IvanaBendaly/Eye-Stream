<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ivy Eye Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="overlay-root" class="overlay-corner" data-mode="live" data-state="awakened">
      <section id="lantern" class="lantern state-awakened" aria-label="Haunted lantern companion">
        <div class="chain" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="lantern-halo" aria-hidden="true"></div>

        <div class="lantern-shell">
          <span class="frame cap"></span>
          <span class="frame body"></span>
          <span class="frame base"></span>
          <span class="glass"></span>
          <span class="cracks"></span>
          <span class="entity-wrap">
            <span class="flame-core"></span>
            <span class="flame-inner"></span>
            <span class="ivy-peeker"><span class="peeker-eye"></span></span>
          </span>
        </div>

        <div class="particle-layer warm" aria-hidden="true"></div>
        <div class="particle-layer ash" aria-hidden="true"></div>
        <div class="particle-layer smoke" aria-hidden="true"></div>
        <div class="burst-ring" aria-hidden="true"></div>
        <div id="explosion-field" class="explosion-field" aria-hidden="true"></div>

        <div class="ritual-layer" aria-hidden="true">
          <div class="ritual-ring"></div>
          <div class="ritual-sigil"></div>
                  </div>
      </section>

      <section id="ivy-game" class="ivy-game" aria-label="Ivy runner mini game" hidden>
        <div class="game-shell">
          <div class="game-sky"></div>
          <div class="game-lane"></div>
          <div id="runner" class="runner">
            <span class="runner-core"></span>
            <span class="runner-eye"></span>
          </div>
          <div id="obstacle-layer" class="obstacle-layer" aria-hidden="true"></div>
          <div id="game-flash" class="game-flash" aria-hidden="true"></div>
          <div id="game-hud" class="game-hud">SCORE 0</div>
          <div class="assist-wrap" aria-label="jump assist">
            <span class="assist-label">JUMP ASSIST</span>
            <div class="assist-meter"><span id="assist-fill" class="assist-fill"></span></div>
          </div>
        </div>
      </section>

      <section id="interaction-header" class="interaction-header" aria-label="interaction header">
        <p>Comfort it • Corrupt it • Ivy to summon</p>
      </section>

      <aside id="chat-panel" class="chat-panel" aria-label="Lantern chat panel">
        <ol id="chat-list"></ol>

        <form id="chat-input-form" class="chat-input" hidden>
          <input id="chat-input" type="text" maxlength="180" placeholder="Try: love joy / ghost demon / ivy ivy ..." autocomplete="off" />
          <button type="submit">Send</button>
        </form>
      </aside>

      <p id="tiny-status" class="tiny-status" hidden></p>

      <section id="test-controls" class="test-controls" hidden>
        <button type="button" data-test-action="ivy">+ ivy</button>
        <button type="button" data-test-action="ten-ivy">ivy x10</button>
        <button type="button" data-test-action="start">start round</button>
        <button type="button" data-test-action="jump">jump</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
