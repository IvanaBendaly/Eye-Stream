<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursed Lantern Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="overlay-root" class="overlay-corner" data-mode="live" data-state="awake">
      <section id="lantern" class="lantern state-awake" aria-label="Cursed flame companion">
        <div class="chain" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="lantern-halo" aria-hidden="true"></div>

        <div class="lantern-shell">
          <span class="frame cap"></span>
          <span class="frame body"></span>
          <span class="frame base"></span>
          <span class="glass"></span>
          <span class="sigil"></span>
          <span class="cracks"></span>
          <span class="thorn-ring"></span>
          <span class="flame-core"></span>
          <span class="flame-inner"></span>
        </div>

        <div class="particle-layer warm" aria-hidden="true"></div>
        <div class="particle-layer ash" aria-hidden="true"></div>
        <div class="particle-layer smoke" aria-hidden="true"></div>
        <div class="burst-ring" aria-hidden="true"></div>
      </section>

      <aside id="chat-panel" class="chat-panel" aria-label="Lantern companion chat panel">
        <header>
          <span class="dot"></span>
          <p>Lantern Feed</p>
        </header>
        <ol id="chat-list"></ol>
      </aside>

      <section id="preview-panel" class="preview-panel" hidden>
        <p id="preview-status">Preview ON • state: awake • showcase: on</p>
        <div class="preview-buttons">
          <button data-state="dormant">Dormant</button>
          <button data-state="awake">Awake</button>
          <button data-state="warm">Warm</button>
          <button data-state="agitated">Agitated</button>
          <button data-state="possessed">Possessed</button>
        </div>
        <button id="toggle-showcase" type="button">Pause showcase</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
